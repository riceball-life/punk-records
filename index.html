<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#a8c2e6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#182136" media="(prefers-color-scheme: dark)" />

    <!-- iOS home-screen install -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Punk Records" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />

    <title>Punk Records</title>

    <!-- Apply a saved theme before first paint to avoid a flash of the wrong one. -->
    <script>
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
